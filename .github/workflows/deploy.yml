name: Deploy Book Haven to GitHub Pages

# Build the Vite frontend (artifacts/book-haven) and publish it to
# GitHub Pages on every push to main. The API server is NOT built or
# deployed here — host it separately on Railway and set the
# VITE_API_URL secret to its public origin.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploy when a new push lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api-spec types (generated client)
        run: pnpm --filter @workspace/api-spec run codegen
        continue-on-error: true

      - name: Build composite libraries
        run: pnpm run typecheck:libs

      - name: Build Book Haven
        # BASE_PATH must match the GitHub Pages sub-path. For a project
        # site at https://<user>.github.io/<repo>/ that's "/<repo>/".
        # For a user/org site at https://<user>.github.io/ use "/".
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          NODE_ENV: production
        run: pnpm --filter @workspace/book-haven run build

      - name: Add .nojekyll
        # Stops GitHub Pages from running Jekyll, which would strip files
        # and folders that start with an underscore (Vite emits them).
        run: touch artifacts/book-haven/dist/public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/book-haven/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
