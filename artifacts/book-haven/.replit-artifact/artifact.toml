kind = "web"
previewPath = "/"
title = "Book Haven"
version = "1.0.0"
id = "artifacts/book-haven"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20177

[services.development]
run = "pnpm --filter @workspace/book-haven run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/book-haven", "run", "build" ]
publicDir = "artifacts/book-haven/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20177"
BASE_PATH = "/"
