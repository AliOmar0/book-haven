<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5e9d0" />
    <title>Book Haven — A cozy place to discover and read classic books</title>
    <meta
      name="description"
      content="Browse, favorite, and read classic public-domain books in a cozy, mobile-first reader."
    />
    <meta property="og:title" content="Book Haven" />
    <meta property="og:description" content="A cozy place to discover and read classic books." />
    <meta property="og:image" content="./opengraph.jpg" />
    <meta property="og:type" content="website" />
    <script>
      // Single Page Apps for GitHub Pages — companion to public/404.html.
      // Restores the "real" path that 404.html packed into the query string.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, "", l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
