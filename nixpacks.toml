[phases.setup]
nixPkgs = ["nodejs_24", "pnpm-10_x"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server run build"]

[start]
cmd = "pnpm --filter @workspace/api-server run start"
